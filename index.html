<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Generator PESEL</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px 12px;
        }
        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<h2>Generator PESEL</h2>

<label>Ile PESELi:</label>
<input type="number" id="ilosc" value="5" min="1">
<button onclick="generuj()">Generuj</button>

<table id="tabela">
    <thead>
        <tr>
            <th>PESEL</th>
            <th>Data urodzenia</th>
            <th>Płeć</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
function generujPeselZDaty(rok, miesiac, dzien) {
    let miesiacKod = miesiac;

    if (rok >= 1800 && rok <= 1899) miesiacKod += 80;
    else if (rok >= 2000 && rok <= 2099) miesiacKod += 20;
    else if (rok >= 2100 && rok <= 2199) miesiacKod += 40;
    else if (rok >= 2200 && rok <= 2299) miesiacKod += 60;

    let seria = Math.floor(Math.random() * 10000);

    let pesel =
        String(rok % 100).padStart(2, '0') +
        String(miesiacKod).padStart(2, '0') +
        String(dzien).padStart(2, '0') +
        String(seria).padStart(4, '0');

    let wagi = [1, 3, 7, 9, 1, 3, 7, 9, 1, 3];

    let suma = 0;
    for (let i = 0; i < 10; i++) {
        suma += parseInt(pesel[i]) * wagi[i];
    }

    let kontrolna = (10 - (suma % 10)) % 10;
    pesel += kontrolna;

    let sexDigit = parseInt(pesel[9]);
    let sex = (sexDigit % 2 === 1) ? "Male" : "Female";

    let data = `${rok.toString().padStart(4, '0')}-${String(miesiac).padStart(2, '0')}-${String(dzien).padStart(2, '0')}`;

    return { pesel, data, sex };
}

function generujLosowyPesel() {
    const currentYear = new Date().getFullYear();
    let rok = Math.floor(Math.random() * (2022 - 1950 + 1)) + 1950;

    if (currentYear - rok <= 18) {
        rok = rok - (currentYear - rok);
    }

    let miesiac = Math.floor(Math.random() * 12) + 1;

    let dniWMiesiacu = [
        31,
        (rok % 4 === 0 ? 29 : 28),
        31, 30, 31, 30,
        31, 31, 30, 31, 30, 31
    ];

    let dzien = Math.floor(Math.random() * dniWMiesiacu[miesiac - 1]) + 1;

    return generujPeselZDaty(rok, miesiac, dzien);
}

function generuj() {
    let ile = parseInt(document.getElementById("ilosc").value);
    let tbody = document.querySelector("#tabela tbody");

    tbody.innerHTML = "";

    for (let i = 0; i < ile; i++) {
        let { pesel, data, sex } = generujLosowyPesel();

        let row = `<tr>
            <td>${pesel}</td>
            <td>${data}</td>
            <td>${sex}</td>
        </tr>`;

        tbody.innerHTML += row;
    }
}
</script>

</body>
</html>
